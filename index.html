<html>
<head>
<style>
@font-face { font-family: 'IBM VGA'; src: url('ibm-vga.ttf') format('truetype'); }
* { cursor: none !important; }
body { background: black; color: white; font-family: 'IBM VGA', monospace; margin: 0; overflow: hidden; padding: 50px 60px; box-sizing: border-box; height: 100vh; display: flex; flex-direction: column; font-size: 24px; line-height: 1.3; }
.inv { background: white; color: black; padding: 0 4px; }
.row { white-space: pre; }
.spacer { flex: 1; }
.center { text-align: center; width: 100%; }
#bigclock { line-height: 1.0; font-size: 24px; }
</style>
</head>
<body>
<div class='row'><span class='inv'> CLAWDPI </span>         <span id='sec'></span></div>
<div class='spacer'></div>
<div class='center'><pre id='bigclock'></pre></div>
<div class='spacer'></div>
<div class='center'><div class='row' id='date'></div></div>
<div class='row'> </div>
<div class='row'><span class='inv'> 100 </span> Index <span class='inv'> 200 </span> News <span class='inv'> 300 </span> Weather</div>
<script>
var B='\u2588',S=' ';
var d={
'0':[B+B+B+B,B+S+S+B,B+S+S+B,B+S+S+B,B+B+B+B],
'1':[S+S+B+S,S+B+B+S,S+S+B+S,S+S+B+S,S+B+B+B],
'2':[B+B+B+B,S+S+S+B,B+B+B+B,B+S+S+S,B+B+B+B],
'3':[B+B+B+B,S+S+S+B,S+B+B+B,S+S+S+B,B+B+B+B],
'4':[B+S+S+B,B+S+S+B,B+B+B+B,S+S+S+B,S+S+S+B],
'5':[B+B+B+B,B+S+S+S,B+B+B+B,S+S+S+B,B+B+B+B],
'6':[B+B+B+B,B+S+S+S,B+B+B+B,B+S+S+B,B+B+B+B],
'7':[B+B+B+B,S+S+S+B,S+S+B+S,S+B+S+S,S+B+S+S],
'8':[B+B+B+B,B+S+S+B,B+B+B+B,B+S+S+B,B+B+B+B],
'9':[B+B+B+B,B+S+S+B,B+B+B+B,S+S+S+B,B+B+B+B],
':':[S,B,S,B,S],
' ':[S+S,S+S,S+S,S+S,S+S]
};
function render(s){
  var l=['','','','',''];
  for(var i=0;i<s.length;i++){
    var g=d[s[i]]||d[' '];
    for(var r=0;r<5;r++) l[r]+=g[r]+S+S;
  }
  return l.join('\n');
}
function update(){
  var now=new Date();
  var h=String(now.getHours()).padStart(2,'0');
  var m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('bigclock').textContent=render(h+':'+m);
  document.getElementById('sec').textContent=now.toLocaleTimeString('en-GB');
  document.getElementById('date').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
update();setInterval(update,1000);
</script>
</body>
</html>
